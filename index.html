<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Analysis Quiz</title>
  <style>
    :root{--blue:#1d4ed8;--blue2:#2563eb;--light:#eff6ff;--white:#fff;--text:#0f172a;--muted:#64748b;--ok:#16a34a;--bad:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(160deg,#dbeafe,#f8fbff);color:var(--text)}
    .app{max-width:860px;margin:24px auto;padding:16px}
    .card{background:var(--white);border:1px solid #dbeafe;border-radius:16px;box-shadow:0 8px 30px rgba(37,99,235,.12);padding:20px;animation:fade .25s ease}
    @keyframes fade{from{opacity:.4;transform:translateY(6px)}to{opacity:1;transform:none}}
    h1{margin:0;color:var(--blue)} .meta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:8px 0 14px}
    .progress{height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden}.progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--blue2));transition:width .2s}
    .q{font-size:1.07rem;line-height:1.45;margin:12px 0}
    .opt{display:block;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;margin:8px 0;cursor:pointer;transition:.2s}
    .opt:hover{border-color:var(--blue)} .opt input{margin-right:8px}
    .opt.selected{background:var(--light);border-color:var(--blue)}
    .opt.right{background:#ecfdf5;border-color:var(--ok)}
    .opt.wrong{background:#fef2f2;border-color:var(--bad)}
    .feedback{font-weight:800;padding:10px 12px;border-radius:10px;margin-top:10px}
    .feedback.ok{background:#ecfdf5;color:var(--ok);border:1px solid #86efac}
    .feedback.bad{background:#fef2f2;color:var(--bad);border:1px solid #fecaca}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--blue);color:#fff}.secondary{background:#e2e8f0}.success{background:var(--ok);color:#fff}
    .hidden{display:none}
    .result-item{padding:10px;border:1px solid #e2e8f0;border-radius:10px;margin:8px 0}
    .correct{border-color:#86efac;background:#f0fdf4}.incorrect{border-color:#fecaca;background:#fef2f2}
    @media (max-width:640px){.meta{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <main class="app">
    <section id="quizView" class="card">
      <h1>🧠 Algorithm Analysis Quiz</h1>
      <div class="meta"><strong id="counter">Question 1 of 60</strong><span id="answered">Answered: 0/60</span></div>
      <div class="progress" aria-label="Progress"><div id="bar"></div></div>
      <p id="question" class="q"></p>
      <div id="options"></div>
      <div class="btns">
        <button id="prevBtn" class="secondary">Previous</button>
        <button id="nextBtn" class="primary">Next</button>
        <button id="submitBtn" class="success hidden">Submit</button>
      </div>
    </section>

    <section id="resultView" class="card hidden">
      <h1>📊 Quiz Results</h1>
      <p id="scoreLine"></p>
      <div class="progress"><div id="scoreBar"></div></div>
      <h3>Review Answers</h3>
      <div id="review"></div>
      <div class="btns"><button id="restartBtn" class="primary">Restart Quiz</button></div>
    </section>
  </main>

<script>
// Complete question bank with options and correct answer index (0-3).
const rawQuizData = [
["Which notation provides an asymptotic upper bound on the running time of an algorithm?",["Big-Ω","Big-Θ","Big-O","Little-o"],2],["What is the time complexity of Bubble Sort in the worst case?",["O(n log n)","O(n²)","O(n)","O(log n)"],1],["Selection sort works by repeatedly finding the ______ element from the unsorted part.",["Largest","Median","Smallest","Random"],2],["In the analysis framework, the efficiency of an algorithm is usually measured as a function of:",["CPU speed","Input size","Programming language","Memory size"],1],["The 'Brute Force' approach to string matching compares the pattern to:",["Only first substring","Random substrings","Every possible substring","Sorted substrings"],2],["Which class represents algorithms with the slowest growth rate?",["O(n²)","O(n log n)","O(n)","O(1)"],3],["The 'Exhaustive Search' technique is typically used for which type of problems?",["Sorting","Searching","Optimization","Combinatorial"],3],["What is the basic operation in Sequential Search?",["Swapping","Comparison","Division","Recursion"],1],["A recursive algorithm's efficiency is typically analyzed using:",["Flowchart","Recurrence relation","Table","Graph"],1],["Which of the following is NOT a brute force algorithm?",["Linear Search","Selection Sort","Bubble Sort","Binary Search"],3],["Which sort uses the 'Decrease-by-constant' (specifically by 1) technique?",["Merge Sort","Quick Sort","Insertion Sort","Heap Sort"],2],["Topological sorting is applicable only to which type of graphs?",["Undirected Graph","Weighted Graph","Directed Acyclic Graph","Complete Graph"],2],["The 'Fake Coin' problem using a balance scale is an example of:",["Greedy","Dynamic Programming","Divide and Conquer","Backtracking"],2],["The Master Theorem is used to solve:",["Sorting problems","Recurrence relations","Graph problems","Searching problems"],1],["Which algorithm is known for its 'Divide and Conquer' approach to sorting?",["Bubble Sort","Merge Sort","Selection Sort","Insertion Sort"],1],["The pivot element is a key part of which sorting algorithm?",["Merge Sort","Heap Sort","Quick Sort","Selection Sort"],2],["What is the best case time complexity of Binary Search?",["O(n)","O(log n)","O(1)","O(n log n)"],2],["In binary tree traversals, 'Root-Left-Right' is known as:",["Inorder","Postorder","Preorder","Level order"],2],["The complexity of finding the height of a Binary Search Tree (BST) is:",["O(1)","O(log n)","O(n)","O(n²)"],2],["Strassen's algorithm is used to improve the efficiency of:",["Sorting","Searching","Matrix multiplication","Graph traversal"],2],["The Josephus problem is an example of:",["Greedy","Recursion","Dynamic Programming","Graph theory"],1],["Russian Peasant Multiplication is based on which technique?",["Greedy","Backtracking","Divide and Conquer","Dynamic Programming"],2],["Which algorithm is used for the 'Selection Problem' (finding the k-th smallest element)?",["Merge Sort","Quick Select","Bubble Sort","Binary Search"],1],["What is the time complexity of Strassen's Matrix Multiplication?",["O(n³)","O(n²)","O(n^2.81)","O(n log n)"],2],["Binary Search requires the input array to be:",["Random","Sorted","Reversed","Unsorted"],1],["Pre-sorting an array can reduce the complexity of finding unique elements to:",["O(n²)","O(n log n)","O(n)","O(log n)"],1],["Which data structure is the foundation of Heap Sort?",["Stack","Queue","Heap","Linked List"],2],["What is the main advantage of a Red-Black Tree over a standard BST?",["Faster insertion","Guaranteed balance","Less memory usage","Simpler implementation"],1],["In a 2-3 Tree, every internal node has:",["Only 2 children","Only 3 children","2 or 3 children","1 or 2 children"],2],["Horspool's algorithm improves string matching by using:",["Hashing","Shift table","Recursion","Sorting"],1],["Prim's algorithm is used to find:",["Shortest path","Minimum spanning tree","Maximum flow","Hamiltonian path"],1],["Which greedy algorithm uses a 'Union-Find' data structure?",["Prim's Algorithm","Dijkstra's Algorithm","Kruskal's Algorithm","Floyd-Warshall"],2],["Dijkstra's algorithm is used to solve which problem?",["Sorting","Shortest path","Graph coloring","Maximum flow"],1],["Huffman coding is primarily used for:",["Encryption","Sorting","Data compression","Searching"],2],["The time complexity of Heap Sort in all cases is:",["O(n²)","O(n log n)","O(n)","O(log n)"],1],["B-Trees are widely used in which area?",["Networking","Operating Systems","Databases","Graphics"],2],["Boyer-Moore algorithm is a ______ matching algorithm.",["Sorting","String","Graph","Searching tree"],1],["The greedy choice property means:",["Choosing all options","Choosing locally optimal solution","Backtracking all solutions","Random selection"],1],["What is the characteristic of a Min-Heap?",["Parent is greater than children","Parent is smaller than children","All elements equal","Sorted structure"],1],["In Kruskal's algorithm, we sort the ______ in non-decreasing order.",["Vertices","Edges","Paths","Nodes"],1],["Dynamic Programming stores results of subproblems to avoid:",["Sorting","Comparison","Recomputation","Recursion"],2],["Which algorithm finds 'All-pairs shortest paths'?",["Dijkstra","Prim","Floyd-Warshall","Kruskal"],2],["The Warshall algorithm is used to find the ______ of a graph.",["Shortest path","Minimum spanning tree","Transitive closure","Maximum flow"],2],["The 'Knapsack Problem' solved by memory functions combines:",["Greedy + Divide","Dynamic Programming + Recursion","Sorting + Searching","Graph + Tree"],1],["Which complexity class contains problems solvable in polynomial time?",["NP","NP-Hard","P","NP-Complete"],2],["A problem is NP-Complete if it is in NP and:",["Easy to solve","NP-Hard","Polynomial time solvable","Greedy solvable"],1],["The N-Queens problem is typically solved using:",["Greedy","Dynamic Programming","Backtracking","Divide and Conquer"],2],["Which technique uses a 'State-Space Tree'?",["Greedy","Backtracking","Divide and Conquer","Sorting"],1],["The 'Branch and Bound' technique is primarily used for:",["Sorting","Optimization problems","Searching","Traversal"],1],["In the 'Sum of Subsets' problem, we find a subset whose sum equals:",["Maximum value","Minimum value","Given target","Average value"],2],["What is the main difference between Backtracking and Branch & Bound?",["Backtracking finds all solutions, Branch & Bound finds optimal solution","Backtracking is faster","Branch & Bound does not use trees","Both are same"],0],["Which of the following is NP-Hard?",["Sorting","Traveling Salesman Problem","Binary Search","Merge Sort"],1],["The 'Memory Function' approach is also known as:",["Greedy","Memoization","Recursion","Iteration"],1],["Computing Binomial Coefficients using DP uses which mathematical identity?",["a² + b²","n!","C(n, k) = C(n-1, k-1) + C(n-1, k)","log n"],2],["Which algorithm uses a distance matrix and updates it iteratively for all pairs?",["Dijkstra","Prim","Floyd-Warshall","Kruskal"],2],["In Backtracking, 'Pruning' the tree means:",["Expanding nodes","Removing invalid paths","Sorting nodes","Traversing all nodes"],1],["Decision Trees are used to prove ______ for comparison-based sorting.",["Upper bound","Lower bound","Average case","Worst case"],1],["Graph coloring is a ______ problem.",["Polynomial","NP-Complete","Linear","Sorting"],1],["NP stands for:",["Non Polynomial","Non-deterministic Polynomial","Negative Polynomial","Normal Polynomial"],1],["The Knapsack problem involves selecting items to maximize:",["Weight","Cost","Profit","Size"],2]
];

function shuffledQuestion([question, options, correctIndex]) {
  const items = options.map((text, idx) => ({ text, isCorrect: idx === correctIndex }));
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  return [question, items.map(i => i.text), items.findIndex(i => i.isCorrect)];
}

const quizData = rawQuizData.map(shuffledQuestion);
const correctAnswers = quizData.map(q=>q[2]);
let current=0; const selectedAnswers = Array(quizData.length).fill(null);
const counter = document.getElementById('counter'), answered = document.getElementById('answered'), bar = document.getElementById('bar');
const questionEl = document.getElementById('question'), optionsEl = document.getElementById('options');
const prevBtn=document.getElementById('prevBtn'), nextBtn=document.getElementById('nextBtn'), submitBtn=document.getElementById('submitBtn');
function updateProgress(){const done=selectedAnswers.filter(v=>v!==null).length;answered.textContent=`Answered: ${done}/${quizData.length}`;bar.style.width=`${(done/quizData.length)*100}%`;}
function renderQuestion(){const [q,opts,correct]=quizData[current];counter.textContent=`Question ${current+1} of ${quizData.length}`;questionEl.textContent=q;optionsEl.innerHTML='';
opts.forEach((opt,i)=>{const l=document.createElement('label');l.className='opt';if(selectedAnswers[current]===i) l.classList.add('selected');
    if(selectedAnswers[current]!==null && i===correct) l.classList.add('right');
    if(selectedAnswers[current]!==null && selectedAnswers[current]===i && i!==correct) l.classList.add('wrong');
    l.innerHTML=`<input type="radio" name="q" ${selectedAnswers[current]===i?'checked':''}> ${String.fromCharCode(65+i)}) ${opt}`;l.querySelector('input').addEventListener('change',()=>{selectedAnswers[current]=i;renderQuestion();updateProgress();});optionsEl.appendChild(l);});
    if(selectedAnswers[current]!==null){const fb=document.createElement('div');fb.className=`feedback ${selectedAnswers[current]===correct?'ok':'bad'}`;fb.textContent=selectedAnswers[current]===correct?'✅ Correct! Great job.':'❌ Incorrect. Correct option is '+String.fromCharCode(65+correct)+'.';optionsEl.appendChild(fb);}  
prevBtn.disabled=current===0;nextBtn.classList.toggle('hidden',current===quizData.length-1);submitBtn.classList.toggle('hidden',current!==quizData.length-1);}
function showResults(){let score=0;const review=document.getElementById('review');review.innerHTML='';quizData.forEach((q,idx)=>{if(selectedAnswers[idx]===q[2])score++;const item=document.createElement('div');item.className='result-item '+(selectedAnswers[idx]===q[2]?'correct':'incorrect');
item.innerHTML=`<strong>Q${idx+1}:</strong> ${q[0]}<br><small>Your answer: ${selectedAnswers[idx]!==null?String.fromCharCode(65+selectedAnswers[idx]):'Not answered'} | Correct: ${String.fromCharCode(65+q[2])}</small>`;review.appendChild(item);});
const pct=Math.round((score/quizData.length)*100);document.getElementById('scoreLine').textContent=`Score: ${score}/${quizData.length} (${pct}%)`;document.getElementById('scoreBar').style.width=`${pct}%`;
document.getElementById('quizView').classList.add('hidden');document.getElementById('resultView').classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'});}
prevBtn.onclick=()=>{if(current>0){current--;renderQuestion();}}; nextBtn.onclick=()=>{if(current<quizData.length-1){current++;renderQuestion();}}; submitBtn.onclick=showResults;
document.getElementById('restartBtn').onclick=()=>{current=0;selectedAnswers.fill(null);document.getElementById('resultView').classList.add('hidden');document.getElementById('quizView').classList.remove('hidden');renderQuestion();updateProgress();};
renderQuestion(); updateProgress(); window.correctAnswers=correctAnswers;
</script>
</body>
</html>
